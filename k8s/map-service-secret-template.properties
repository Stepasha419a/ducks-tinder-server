spring.application.name=map_service

grpc.server.port=50051
grpc.server.security.enabled=true
grpc.server.security.certificate-chain=file:cert/dev-k8s/tls.crt
grpc.server.security.private-key=file:cert/dev-k8s/tls.key
grpc.server.security.client-auth=REQUIRE
grpc.server.security.trust-cert-collection=file:cert/dev-k8s/ca.crt

spring.datasource.url=jdbc:postgresql://postgres-service:5432/map-service?sslmode=verify-full&sslrootcert=cert/dev-k8s/ca.crt&sslcert=cert/dev-k8s/tls.crt&sslkey=/tmp/tls-key.der
spring.datasource.host=postgres
spring.datasource.port=5432
spring.datasource.username=prisma
spring.datasource.password=prisma
spring.datasource.database=map-service
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.connection-timeout=5000

management.server.port=3443
management.server.ssl.enabled=true
management.server.ssl.certificate=cert/dev-k8s/tls.crt
management.server.ssl.certificate-private-key=cert/dev-k8s/tls.key
management.server.ssl.client-auth=need
management.server.ssl.trust-certificate=cert/dev-k8s/ca.crt

management.endpoints.web.exposure.include=health,prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram[http.server.requests]=true
management.metrics.tags.application=map_service

management.endpoint.health.group.readyz.include=*
management.endpoint.health.group.readyz.show-details=always

management.endpoint.health.group.livez.include=ping
management.endpoint.health.group.livez.show-details=never

management.endpoint.health.group.startupz.include=ping
management.endpoint.health.group.startupz.show-details=never
